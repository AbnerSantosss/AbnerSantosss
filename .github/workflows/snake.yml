name: Generate Cyberpunk Snake

on:
  schedule:
    # Executa a cada 12 horas automaticamente
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Gera a arte em blocos neons
      - uses: Platane/snk@v3
        with:
          github_user_name: AbnerSantosss
          # Aplica a "escada de cores" Neon que vai do roxo sombrio para o Ciano (#00FFFF) e Magenta (#FF00FF)
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#39FF14&color_dots=#0D1117,#4b0082,#8a2be2,#ff00ff,#00ffff

      # Move o arquivo visual para a branch 'output'
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
